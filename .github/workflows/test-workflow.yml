name: Test

on: [push, pull_request]

jobs:
  Test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15, windows-latest]
        fpm-version: ["v0.9.0", "v0.10.1", "v0.11.0", "v0.12.0", "v0.13.0", "latest", "current"]
        node-version: ["24.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: MacOS system setup
        if: runner.os == 'macOS'
        # fpm binaries are currently built and linking against gfortran-12 runtime on macOS
        run: |
          brew install gcc@12

      - name: Install dependencies
        run: npm ci

      - name: fpm-setup
        uses: ./ # Uses action in the root directory
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fpm-version: ${{ matrix.fpm-version }}

      - name: Checkout the fpm repo
        if: matrix.fpm-version == 'latest'
        uses: actions/checkout@v5
        with:
          repository: fortran-lang/fpm

      - name: Setup the Fortran compiler
        if: matrix.fpm-version == 'latest'
        uses: fortran-lang/setup-fortran@v1.9.0
        with:
          compiler: gcc
          version: 12

      - name: Check that all the fpm tests pass
        if: matrix.fpm-version == 'latest'
        run: fpm test
